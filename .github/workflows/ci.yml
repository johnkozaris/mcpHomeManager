name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check src/

      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy

      - name: Type check (pyright)
        working-directory: backend
        run: npx --yes pyright

      - name: Test
        working-directory: backend
        run: uv run python -m pytest -x -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Type check and build
        working-directory: frontend
        run: pnpm build

      - name: Test
        working-directory: frontend
        run: pnpm test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate compose config
        run: docker compose --env-file .env.example config >/dev/null

      - name: Validate compose (PostgreSQL override)
        run: docker compose -f docker-compose.yml -f docker-compose.postgres.yml --env-file .env.example config >/dev/null

      - name: Build image
        run: docker build -t mcp-home-manager .
