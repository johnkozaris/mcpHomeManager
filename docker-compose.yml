services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcp_home
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_home"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://mcp:${POSTGRES_PASSWORD:-REPLACE_WITH_POSTGRES_PASSWORD}@db:5432/mcp_home}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APP_NAME: ${APP_NAME:-MCP Manager}
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-My Homelab}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      SELF_MCP_ENABLED: ${SELF_MCP_ENABLED:-true}
      DEBUG: ${DEBUG:-false}
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  app_data:
