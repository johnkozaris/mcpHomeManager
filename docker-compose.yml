# MCP Home Manager — self-hosted runtime compose file
# Docs: https://github.com/johnkozaris/mcpHomeManager
# Works out of the box: docker compose up -d (no .env required)
# To customise, create a .env file — see .env.example for options.
services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcp_home}
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  app:
    image: ghcr.io/johnkozaris/mcp-home-manager:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mcp_home}
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      APP_NAME: ${APP_NAME:-MCP Manager}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-My Homelab}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  app_data:
