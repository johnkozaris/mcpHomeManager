# MCP Home Manager — docker compose up -d
# Docs: https://github.com/johnkozaris/mcpHomeManager
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcp_home
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: REPLACE_WITH_POSTGRES_PASSWORD
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_home"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  app:
    image: ghcr.io/johnkozaris/mcp-home-manager:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mcp:REPLACE_WITH_POSTGRES_PASSWORD@db:5432/mcp_home
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  app_data:
